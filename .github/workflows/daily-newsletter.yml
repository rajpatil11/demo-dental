name: Daily AI Newsletter

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST (UTC+5:30) every day
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate newsletter
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python tools/generate_newsletter.py

      - name: Send newsletter
        env:
          EMAIL_SMTP_HOST: smtp.gmail.com
          EMAIL_SMTP_PORT: 587
          EMAIL_SMTP_USER: rp20307555@gmail.com
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
          EMAIL_FROM: rp20307555@gmail.com
        run: |
          DATE=$(date +%Y-%m-%d)
          SUBJECT="EXELVO AI Daily Intelligence — $(date +'%B %d, %Y')"
          python tools/send_email.py \
            --to rp20307555@gmail.com \
            --subject "$SUBJECT" \
            --html ".tmp/newsletter_${DATE}.html"
