name: Backfill Missing Emails

on:
  workflow_dispatch:
    # Manually triggered from GitHub Actions tab → Run workflow

jobs:
  backfill:
    name: Send Email 1 to contacts that never received it
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          GHL_API_KEY:              ${{ secrets.GHL_API_KEY }}
          CLAUDE_API_KEY:           ${{ secrets.CLAUDE_API_KEY }}
          VAPI_API_KEY:             ${{ secrets.VAPI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID:                 ${{ secrets.SHEET_ID }}
        run: python backfill_emails.py
