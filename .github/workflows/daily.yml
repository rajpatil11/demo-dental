name: Daily Outbound Pipeline

on:
  schedule:
    # Mon–Fri at 5:00 PM IST = 11:30 UTC
    - cron: "30 11 * * 1-5"
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  pipeline:
    name: Run outbound pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 15 contacts × 2min gap + processing headroom

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GHL_API_KEY:          ${{ secrets.GHL_API_KEY }}
          VAPI_API_KEY:         ${{ secrets.VAPI_API_KEY }}
          CLAUDE_API_KEY:       ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SHEET_ID:             ${{ secrets.SHEET_ID }}
        run: python pipeline.py
