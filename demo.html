<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachel — AI Receptionist Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 100px;
      font-size: 12px;
      color: #888;
      padding: 6px 14px;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0055ff, #00c9ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 28px;
      position: relative;
    }

    .avatar.active::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid #00c9ff;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.1); }
    }

    #call-btn {
      background: #0055ff;
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 16px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      max-width: 240px;
    }

    #call-btn:hover { background: #0044dd; }
    #call-btn:active { transform: scale(0.98); }

    #call-btn.active {
      background: #dc2626;
    }

    #call-btn.active:hover { background: #b91c1c; }

    #status {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
      min-height: 20px;
    }

    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: #333;
    }

    .footer a {
      color: #555;
      text-decoration: none;
    }

    .footer a:hover { color: #888; }

    #error-msg {
      display: none;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13px;
      color: #f87171;
      margin-top: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="badge">AI Receptionist Demo</div>

  <div class="avatar" id="avatar">🎙️</div>

  <h1 id="agent-name">Rachel</h1>
  <p class="subtitle" id="agent-desc">
    Your AI receptionist is ready.<br>Click below to start a live voice call.
  </p>

  <button id="call-btn" onclick="toggleCall()">Start Call</button>
  <div id="status">Powered by EXELVO AI</div>
  <div id="error-msg"></div>
</div>

<div class="footer">
  Built by <a href="https://www.exelvoai.com" target="_blank">EXELVO AI</a>
  &nbsp;·&nbsp;
  <a href="https://cal.com/parakeeet.ai/strategy-call-exelvo-ai" target="_blank">Book a strategy call</a>
</div>

<script type="module">
  import Vapi from "https://esm.sh/@vapi-ai/web";

  // ── Config ──────────────────────────────────────────────────────
  const VAPI_PUBLIC_KEY = "2e95a298-e324-4446-afd4-90ea681ca2e8";

  // ── Read assistantId from URL ────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const assistantId = params.get("assistantId");
  const practiceName = params.get("practice");

  if (practiceName) {
    document.getElementById("agent-name").textContent = "Rachel — " + decodeURIComponent(practiceName);
    document.getElementById("agent-desc").innerHTML =
      "Your AI receptionist for <strong>" + decodeURIComponent(practiceName) + "</strong><br>Click below to start a live voice call.";
  }

  if (!assistantId) {
    showError("No assistantId found in URL. This link may be invalid.");
  }

  // ── Vapi SDK ─────────────────────────────────────────────────────
  let vapi = null;
  let callActive = false;

  async function toggleCall() {
    const btn = document.getElementById("call-btn");
    const status = document.getElementById("status");
    const avatar = document.getElementById("avatar");

    if (callActive) {
      // End call
      if (vapi) vapi.stop();
      callActive = false;
      btn.textContent = "Start Call";
      btn.classList.remove("active");
      avatar.classList.remove("active");
      status.textContent = "Call ended. Thanks for trying Rachel!";
      return;
    }

    if (!assistantId) {
      showError("No assistantId in URL.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Connecting...";
    status.textContent = "Loading voice AI...";

    try {
      if (!vapi) {
        vapi = new Vapi(VAPI_PUBLIC_KEY);

        vapi.on("call-start", () => {
          callActive = true;
          btn.disabled = false;
          btn.textContent = "End Call";
          btn.classList.add("active");
          avatar.classList.add("active");
          status.textContent = "Connected — Rachel is listening...";
        });

        vapi.on("call-end", () => {
          callActive = false;
          btn.disabled = false;
          btn.textContent = "Start Call";
          btn.classList.remove("active");
          avatar.classList.remove("active");
          status.textContent = "Call ended. Thanks for trying Rachel!";
        });

        vapi.on("error", (e) => {
          callActive = false;
          btn.disabled = false;
          btn.textContent = "Start Call";
          btn.classList.remove("active");
          avatar.classList.remove("active");
          showError("Error: " + (e?.message || JSON.stringify(e)));
        });
      }

      await vapi.start(assistantId);

    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Start Call";
      status.textContent = "";
      showError("Could not connect: " + err.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  // Expose to button onclick (needed for module scope)
  window.toggleCall = toggleCall;
</script>

</body>
</html>
